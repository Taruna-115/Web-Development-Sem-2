<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        // Async fxn acts like sync fxn

        function first(){
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    try {
                        console.log("first")
                        resolve("first completed")
                    } catch (error){
                        reject(error)
                    }
                }, 4000)
            })
        }

        function second(){
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    try {
                        console.log("second")
                        resolve("second completed")
                    } catch (error){
                        reject(error)
                    }
                }, 2000)
            })
        }

        function third(){
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    try {
                        console.log("third")
                        resolve("third completed")
                    } catch (error){
                        reject(error)
                    }
                }, 1000)
            })
        }


        // first()
        // second()
        // third()     //Order: 3>2>1....becoz ye 1 saath run krenge(ye promise de rha h but depend nhi krva raha h)
        // So to make them depend :

        first()
        .then(() => {          // it will wait for promise(agr resolve ho gya to .then() run hoga or agr reject ho gya to .catch() ko run krega)
            return second()
        })
        .then(() => {
            return third()
        })
        .catch(() => {
            console.log("Error in promise")
        })

        // One more method to write:
        // first()
        // .then(()=>second())
        // .then(()=>third())
        // .catch(()=>console.log("Error in promise"))


        // One more method(using await keyword):
        // async function runMyCode(){           //it waits for the promise...not of async code(so if there will not be promise in fxns(first(),second(),third()), then it will not work)  
        //     await first()
        //     await second()
        //     await third()
        // }
        // runMyCode()


        // Without promise: we will use callback fxn
        function first(callback){
            setTimeout(()=>{
                console.log("first")
            callback()
            },3000)
        }
        function second(){
            setTimeout(()=>{
                console.log("second")
            },1000)
        }

        first(()=>{
            second()
        })
        // But we are going to use promise...
    </script>
</body>

</html>
