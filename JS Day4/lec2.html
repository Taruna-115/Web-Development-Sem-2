<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>
</head>
<body>
    <!-- Typing event  -->
    <input type="text" for="abc" id="abc">
    <script>
        let input = document.querySelector("input")
        input.addEventListener("keyup", function(){
            // console.log("Hello");
            console.log(input.value);   //uper vala console comment krke check kro
        })
    </script>
</body>
</html>
